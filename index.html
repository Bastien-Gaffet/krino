<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krino</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <!-- ═══ Accueil ═══ -->
    <section id="vue-accueil" class="vue">
      <div class="accueil-centre">
        <h1>Krino</h1>
        <p class="sous-titre" data-i18n="accueil.sousTitre"></p>
        <button id="btn-choisir" class="btn btn-primaire" data-i18n="accueil.choisir"></button>
        <button id="btn-dernier" class="btn" hidden></button>
      </div>
    </section>

    <div id="cadre-app" class="cadre-app" hidden>
      <nav id="barre-laterale" class="barre-laterale">
        <div class="marque-krino">KRINO</div>
        <div id="nav-dossier" class="nav-dossier"></div>
        <button class="nav-item actif" data-vue="vue-mois"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M7 12h10M10 17h4"/></svg><span data-i18n="nav.trier"></span></button>
        <button class="nav-item" data-vue="vue-galerie"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span data-i18n="nav.galerie"></span></button>
        <button class="nav-item nav-titre-albums" data-vue="vue-albums"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span data-i18n="nav.albums"></span></button>
        <div id="nav-albums"></div>
        <button id="nav-nouvel-album" class="nav-item discret nav-nouvel-album"><span data-i18n="albums.nouveau"></span><span class="plus-nouvel-album">+</span></button>
        <button class="nav-item" data-vue="vue-doublons"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span data-i18n="outils.ongletDoublons"></span></button>
        <button class="nav-item" data-vue="vue-rangement"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h18v4H3z"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg><span data-i18n="outils.ongletRangement"></span></button>
        <span class="espace"></span>
        <button id="nav-kofi" class="nav-item nav-kofi"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.6-9.5-9C1 9 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.4-9.5 9-9.5 9z"/></svg><span data-i18n="kofi.soutenir"></span></button>
        <button class="nav-item" data-vue="vue-corbeille"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6l-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"/></svg><span data-i18n="mois.corbeille"></span></button>
        <button id="nav-reglages" class="nav-item"><svg class="ico-nav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span data-i18n="mois.reglages"></span></button>
      </nav>
      <main class="contenu-app">
    <!-- ═══ Liste des mois ═══ -->
    <section id="vue-mois" class="vue" hidden>
      <header class="barre">
        <button id="btn-retour-accueil" class="btn" data-i18n="mois.dossier"></button>
        <span id="titre-dossier" class="titre-dossier"></span>
        <select id="tri-mois" class="btn">
          <option value="chrono" data-i18n="tri.date"></option>
          <option value="taille" data-i18n="tri.taille"></option>
          <option value="nombre" data-i18n="tri.nombre"></option>
          <option value="restants" data-i18n="tri.restants"></option>
        </select>
        <span id="btn-sens" class="sens" data-i18n-title="mois.inverser" role="button" tabindex="0"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M4 7l4-4 4 4"/></svg></span>
        <label class="filtre-faits"><input type="checkbox" id="masquer-faits" /> <span data-i18n="mois.masquerFaits"></span></label>
      </header>
      <div id="conteneur-mois" class="conteneur-mois"></div>
    </section>

    <!-- ═══ Galerie (Task 4) ═══ -->
    <section id="vue-galerie" class="vue" hidden>
      <header class="barre">
        <span class="titre-dossier" id="titre-galerie"></span>
        <select id="filtre-galerie" class="btn">
          <option value="tout" data-i18n="galerie.tout"></option>
          <option value="nontriees" data-i18n="galerie.nonTriees"></option>
          <option value="gardees" data-i18n="galerie.gardees"></option>
          <option value="favoris" data-i18n="galerie.favoris"></option>
          <option value="videos" data-i18n="galerie.videos"></option>
        </select>
        <select id="saut-galerie" class="btn"></select>
        <input id="taille-galerie" type="range" min="90" max="260" value="150" />
        <button id="btn-exporter-album2" class="btn" data-i18n="albums.exporter" hidden></button>
        <button id="btn-supprimer-album2" class="btn btn-danger-leger" data-i18n="albums.supprimer" hidden></button>
        <span class="espace"></span>
        <span id="bilan-galerie" class="progression"></span>
      </header>
      <div id="defil-galerie" class="defilable">
        <div id="sections-galerie"></div>
      </div>
      <div id="barre-selection" class="barre-selection" hidden>
        <span id="bilan-selection"></span>
        <button id="sel-favori" class="btn"><svg class="ico-coeur" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.6-9.5-9C1 9 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.4-9.5 9-9.5 9z"/></svg> <span data-i18n="galerie.favori"></span></button>
        <button id="sel-deplacer" class="btn btn-primaire" data-i18n="albums.deplacer"></button>
        <button id="sel-retirer" class="btn" data-i18n="albums.retirer" hidden></button>
        <button id="sel-corbeille" class="btn btn-danger-leger" data-i18n="mois.corbeille"></button>
        <button id="sel-annuler" class="btn" data-i18n="galerie.annulerSel"></button>
      </div>
    </section>

    <!-- ═══ Page d'accueil des albums (Task 5) ═══ -->
    <section id="vue-albums" class="vue" hidden>
      <header class="barre">
        <button id="btn-retour-choix" class="btn btn-ico" hidden>&larr;</button>
        <span class="titre-dossier" id="titre-albums"></span>
        <span class="espace"></span>
        <span id="bilan-albums" class="progression"></span>
      </header>
      <div class="defilable">
        <div id="grille-albums" class="grille-mois"></div>
      </div>
    </section>

    <!-- ═══ Tri d'un mois ═══ -->
    <section id="vue-tri" class="vue" hidden>
      <header class="barre">
        <button id="btn-retour-mois" class="btn btn-ico" data-i18n-title="tri.retour">&larr;</button>
        <span id="titre-tri" class="titre-dossier"></span>
        <span id="progression-tri" class="progression"></span>
        <span class="espace"></span>
        <button id="btn-rafale" class="btn" hidden></button>
        <button id="btn-annuler" class="btn" data-i18n="tri.annuler" data-i18n-title="tri.annulerTitre"></button>
        <button id="btn-garder-reste" class="btn" data-i18n="tri.garderReste" data-i18n-title="tri.garderResteTitre"></button>
        <button id="btn-revue" class="btn btn-primaire" data-i18n="tri.revue"></button>
      </header>
      <div id="scene" class="scene">
        <div id="carte-fond" class="carte carte-fond" hidden>
          <div class="carte-titre"></div>
          <div class="carte-visuel"></div>
          <div class="carte-infos"></div>
        </div>
        <div id="carte" class="carte" hidden>
          <div id="carte-nom" class="carte-titre"></div>
          <div class="carte-visuel">
            <img id="apercu-img" alt="" draggable="false" hidden />
            <video id="apercu-video" controls muted hidden></video>
            <div id="badge-garder" class="badge badge-garder" data-i18n="rafale.garder"></div>
            <div id="badge-jeter" class="badge badge-jeter" data-i18n="rafale.jeter"></div>
          </div>
          <div id="carte-infos" class="carte-infos"></div>
        </div>
        <div id="fin-mois" class="fin-mois" hidden>
          <h2 data-i18n="finMois.titre"></h2>
          <p data-i18n="finMois.texte"></p>
          <div class="rangee-boutons centre">
            <button id="btn-fin-revue" class="btn btn-primaire"><span data-i18n="tri.revue"></span> <kbd id="kbd-valider"></kbd></button>
          </div>
        </div>
      </div>
      <footer id="pied-tri" class="pied-tri">
        <button id="btn-jeter" class="btn btn-jeter"><span data-i18n="tri.jeter"></span> <kbd id="kbd-jeter"></kbd></button>
        <button id="btn-favori" class="btn btn-favori" data-i18n-title="tri.favoriTitre"><svg class="ico-coeur" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.6-9.5-9C1 9 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.4-9.5 9-9.5 9z"/></svg> <kbd id="kbd-favori"></kbd></button>
        <span class="aide-zoom" data-i18n="tri.aideZoom"></span>
        <button id="btn-garder" class="btn btn-garder"><span data-i18n="tri.garder"></span> <kbd id="kbd-garder"></kbd></button>
      </footer>
    </section>

    <!-- ═══ Comparateur de rafale ═══ -->
    <section id="vue-rafale" class="vue" hidden>
      <header class="barre">
        <button id="btn-retour-rafale" class="btn btn-ico">&larr;</button>
        <span class="titre-dossier" data-i18n="rafale.titre"></span>
        <span class="espace"></span>
        <span id="bilan-rafale" class="progression"></span>
        <button id="btn-valider-rafale" class="btn btn-primaire" data-i18n="rafale.appliquer"></button>
      </header>
      <p class="aide-revue" data-i18n="rafale.aide"></p>
      <div id="grille-rafale" class="grille-rafale"></div>
    </section>

    <!-- ═══ Revue de fin de mois ═══ -->
    <section id="vue-revue" class="vue" hidden>
      <header class="barre">
        <button id="btn-retour-tri" class="btn btn-ico">&larr;</button>
        <span id="titre-revue" class="titre-dossier"></span>
        <span class="espace"></span>
        <span id="bilan-revue" class="progression"></span>
        <button id="btn-valider-mois" class="btn btn-primaire"><span data-i18n="revue.valider"></span> <kbd id="kbd-valider2"></kbd></button>
      </header>
      <div class="defilable">
        <p class="aide-revue" data-i18n="revue.aide"></p>
        <h3 class="titre-groupe garder" data-i18n="revue.gardees"></h3>
        <div id="grille-gardees" class="grille-vignettes"></div>
        <h3 class="titre-groupe jeter" data-i18n="revue.jetees"></h3>
        <div id="grille-jetees" class="grille-vignettes"></div>
      </div>
    </section>

    <!-- ═══ Corbeille ═══ -->
    <section id="vue-corbeille" class="vue" hidden>
      <header class="barre">
        <button id="btn-retour-corbeille" class="btn btn-ico">&larr;</button>
        <span class="titre-dossier" data-i18n="corbeille.titre"></span>
        <span id="bilan-corbeille" class="progression"></span>
        <span class="espace"></span>
        <button id="btn-restaurer" class="btn" data-i18n="corbeille.restaurerTout"></button>
        <button id="btn-vider" class="btn btn-danger" data-i18n="corbeille.vider"></button>
      </header>
      <div id="defil-corbeille" class="defilable">
        <div id="grille-corbeille" class="grille-vignettes"></div>
      </div>
      <div id="barre-selection-corbeille" class="barre-selection" hidden>
        <span id="bilan-selection-corbeille"></span>
        <button id="sel-restaurer-corbeille" class="btn btn-primaire" data-i18n="corbeille.restaurer"></button>
        <button id="sel-supprimer-corbeille" class="btn btn-danger" data-i18n="corbeille.supprimerDef"></button>
        <button id="sel-annuler-corbeille" class="btn" data-i18n="galerie.annulerSel"></button>
      </div>
    </section>

    <!-- ═══ Doublons & similaires ═══ -->
    <section id="vue-doublons" class="vue" hidden>
      <header class="barre">
        <span class="titre-dossier" data-i18n="outils.ongletDoublons"></span>
        <span id="bilan-doublons" class="progression"></span>
        <span class="espace"></span>
        <button id="btn-appliquer-doublons" class="btn btn-primaire" hidden></button>
      </header>
      <div class="defilable">
        <p class="aide-revue" data-i18n="outils.aide"></p>
        <div class="params-outils">
          <label class="ligne-radio"><input type="radio" name="mode-doublons" value="exact" checked /> <span data-i18n="outils.exact"></span></label>
          <label class="ligne-radio"><input type="radio" name="mode-doublons" value="similaires" /> <span data-i18n="outils.similaires"></span></label>
          <label id="ligne-seuil" class="ligne-radio" hidden><span data-i18n="outils.seuil"></span>
            <select id="seuil-doublons" class="btn">
              <option value="0" selected data-i18n="outils.seuil0"></option>
              <option value="2" data-i18n="outils.seuil2"></option>
              <option value="4" data-i18n="outils.seuil4"></option>
            </select>
          </label>
          <button id="btn-analyser-doublons" class="btn btn-primaire" data-i18n="outils.analyser"></button>
        </div>
        <p id="avertissement-doublons" class="aide-revue" data-i18n="outils.avertissement" hidden></p>
        <div id="groupes-doublons"></div>
      </div>

      <!-- Écran de vérification récapitulatif avant envoi à la corbeille -->
      <div id="verif-doublons" class="verif-doublons" hidden>
        <header class="barre">
          <button id="btn-retour-verif" class="btn btn-ico">&larr;</button>
          <span class="titre-dossier" data-i18n="outils.verifTitre"></span>
          <span id="bilan-verif-doublons" class="progression"></span>
          <span class="espace"></span>
          <button id="btn-valider-verif" class="btn btn-danger"></button>
        </header>
        <div class="defilable">
          <p class="aide-revue" data-i18n="outils.verifAide"></p>
          <div id="grille-verif-doublons" class="grille-vignettes marge"></div>
        </div>
      </div>
    </section>

    <!-- ═══ Rangement par date ═══ -->
    <section id="vue-rangement" class="vue" hidden>
      <header class="barre">
        <span class="titre-dossier" data-i18n="outils.ongletRangement"></span>
      </header>
      <div class="defilable">
        <p class="aide-revue" data-i18n="rangement.aide"></p>
        <div class="params-outils">
          <button id="btn-ranger" class="btn btn-primaire" data-i18n="rangement.lancer"></button>
          <button id="btn-annuler-rangement" class="btn" data-i18n="rangement.annulerDernier"></button>
          <span id="resultat-rangement" class="progression"></span>
        </div>
        <div id="apercu-rangement" class="apercu-rangement" hidden>
          <h3 class="titre-apercu-rangement" data-i18n="rangement.apercuTitre"></h3>
          <div id="arbre-rangement" class="arbre-rangement"></div>
        </div>
      </div>
    </section>
      </main>
    </div>

    <!-- ═══ Modale réglages ═══ -->
    <dialog id="modale-reglages">
      <h2 data-i18n="reglages.titre"></h2>
      <h3 class="titre-reglage" data-i18n="reglages.apparence"></h3>
      <label class="ligne-radio"><input type="radio" name="theme" value="auto" /> <span data-i18n="reglages.themeAuto"></span></label>
      <label class="ligne-radio"><input type="radio" name="theme" value="sombre" /> <span data-i18n="reglages.themeSombre"></span></label>
      <label class="ligne-radio"><input type="radio" name="theme" value="clair" /> <span data-i18n="reglages.themeClair"></span></label>
      <h3 class="titre-reglage" data-i18n="reglages.langue"></h3>
      <label class="ligne-radio"><input type="radio" name="langue" value="auto" /> <span data-i18n="reglages.langueAuto"></span></label>
      <label class="ligne-radio"><input type="radio" name="langue" value="fr" /> Français</label>
      <label class="ligne-radio"><input type="radio" name="langue" value="en" /> English</label>
      <h3 class="titre-reglage" data-i18n="reglages.affichage"></h3>
      <label class="ligne-radio"><input type="checkbox" id="opt-annees" /> <span data-i18n="reglages.grouperAnnees"></span></label>
      <h3 class="titre-reglage" data-i18n="reglages.regroupement"></h3>
      <label class="ligne-radio"><input type="radio" name="source-date" value="exif" /> <span data-i18n="reglages.exif"></span></label>
      <label class="ligne-radio"><input type="radio" name="source-date" value="fichier" /> <span data-i18n="reglages.fichier"></span></label>
      <label class="ligne-radio"><input type="radio" name="regroupement" value="mois" /> <span data-i18n="reglages.parMois"></span></label>
      <label class="ligne-radio"><input type="radio" name="regroupement" value="evenement" /> <span data-i18n="reglages.parEvenement"></span></label>
      <h3 class="titre-reglage" data-i18n="reglages.raccourcis"></h3>
      <p class="aide" data-i18n="reglages.raccourcisAide"></p>
      <div class="ligne-raccourci"><span data-i18n="reglages.garder"></span><button class="btn touche" data-action="garder"></button></div>
      <div class="ligne-raccourci"><span data-i18n="reglages.jeter"></span><button class="btn touche" data-action="jeter"></button></div>
      <div class="ligne-raccourci"><span data-i18n="reglages.annuler"></span><button class="btn touche" data-action="annuler"></button></div>
      <div class="ligne-raccourci"><span data-i18n="reglages.valider"></span><button class="btn touche" data-action="valider"></button></div>
      <div class="ligne-raccourci"><span data-i18n="reglages.favori"></span><button class="btn touche" data-action="favori"></button></div>
      <h3 class="titre-reglage" data-i18n="reglages.aide"></h3>
      <div class="rangee-boutons gauche">
        <button id="btn-revoir-tuto" class="btn" data-i18n="reglages.tuto"></button>
        <button id="btn-reset-tout" class="btn btn-danger-leger" data-i18n="mois.reset" data-i18n-title="mois.resetTitre"></button>
        <button id="btn-voir-cgu" class="btn" data-i18n="reglages.cgu"></button>
        <button id="btn-verif-maj" class="btn" data-i18n="reglages.maj"></button>
        <button id="btn-aide-blocage" class="btn" data-i18n="reglages.bloquee"></button>
      </div>
      <div class="rangee-boutons">
        <button class="btn fermer" data-i18n="reglages.fermer"></button>
      </div>
    </dialog>

    <!-- ═══ Mise à jour disponible ═══ -->
    <dialog id="modale-maj">
      <h2 data-i18n="maj.titre"></h2>
      <p id="maj-detail" class="aide"></p>
      <div class="rangee-boutons">
        <button class="btn fermer" data-i18n="maj.plusTard"></button>
        <button id="btn-maj-telecharger" class="btn btn-primaire" data-i18n="maj.telecharger"></button>
      </div>
    </dialog>

    <!-- ═══ Soutien Ko-fi ═══ -->
    <dialog id="modale-kofi" class="modale-kofi">
      <img id="kofi-banniere" class="kofi-banniere" alt="Ko-fi" />
      <h2 data-i18n="kofi.titre"></h2>
      <p class="aide" data-i18n="kofi.texte"></p>
      <div class="rangee-boutons">
        <button class="btn fermer" data-i18n="kofi.plusTard"></button>
        <button id="btn-kofi" class="btn btn-kofi" data-i18n="kofi.bouton"></button>
      </div>
    </dialog>

    <!-- ═══ Conditions d'utilisation ═══ -->
    <dialog id="modale-cgu">
      <h2 data-i18n="cgu.titre"></h2>
      <div class="texte-cgu" data-i18n-html="cgu.html"></div>
      <div class="rangee-boutons">
        <button id="btn-accepter-cgu" class="btn btn-primaire" data-i18n="cgu.accepter"></button>
      </div>
    </dialog>

    <!-- ═══ Mois validé ═══ -->
    <dialog id="modale-valide">
      <h2 data-i18n="valide.titre"></h2>
      <p id="valide-detail" class="aide"></p>
      <div class="rangee-boutons">
        <button id="btn-valide-menu" class="btn"><span data-i18n="valide.menu"></span> <kbd id="kbd-valide-menu"></kbd></button>
        <button id="btn-valide-suivant" class="btn btn-primaire"><span data-i18n="valide.suivant"></span> <kbd id="kbd-valide-suivant"></kbd></button>
      </div>
    </dialog>

    <!-- ═══ Visionneuse ═══ -->
    <div id="visionneuse" class="visionneuse" hidden>
      <button id="vis-fermer" class="btn btn-ico vis-fermer">&times;</button>
      <button id="vis-prec" class="btn btn-ico vis-nav vis-prec">&larr;</button>
      <img id="vis-img" alt="" hidden />
      <video id="vis-video" controls hidden></video>
      <button id="vis-suiv" class="btn btn-ico vis-nav vis-suiv">&rarr;</button>
      <div id="vis-legende" class="vis-legende"></div>
    </div>

    <!-- ═══ Dialogue Krino (confirmations, saisies, messages) ═══ -->
    <dialog id="dialogue-krino" class="dialogue-krino">
      <p class="dialogue-texte"></p>
      <input class="dialogue-champ" type="text" hidden />
      <div class="rangee-boutons">
        <button class="btn dialogue-annuler" data-i18n="dialogue.annuler"></button>
        <button class="btn btn-primaire dialogue-ok" data-i18n="dialogue.ok"></button>
      </div>
    </dialog>

    <!-- ═══ Superposition de chargement ═══ -->
    <div id="chargement" class="chargement" hidden>
      <div class="chargement-boite">
        <div class="loader"></div>
        <h2 id="chargement-titre"></h2>
        <p id="chargement-detail"></p>
        <div class="jauge grande"><div id="chargement-jauge"></div></div>
        <button id="btn-annuler-tache" class="btn btn-danger-leger" data-i18n="chargement.annuler" hidden></button>
      </div>
    </div>

    <!-- ═══ Bulle de tutoriel ═══ -->
    <div id="tuto-bulle" class="tuto-bulle" hidden>
      <p id="tuto-texte"></p>
      <div class="rangee-boutons">
        <span id="tuto-etape" class="etape espace"></span>
        <button id="tuto-quitter" class="btn" data-i18n="tuto.quitter"></button>
        <button id="tuto-suivant" class="btn btn-primaire"></button>
      </div>
    </div>
  </body>
</html>
